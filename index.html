<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Amoroso</title>
    <link rel="stylesheet" href="estilos/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <h2>Osita <3</h2>
        <p class="parrafos">Que afrodita sienta celos de mi amor por tus ojos</p>

        <!-- Cards para pistas (inicialmente ocultas) -->
        <div class="card" id="card-usuario">
            <span class="card-text parrafos">Usuario: 🍬 en texto</span>
        </div>
        <div class="card" id="card-contrasena">
            <span class="card-text parrafos">La contraseña es uno de mis apodos seguido de 123</span>
        </div>

        <!-- Formulario de acceso -->
        <form id="formulario-acceso">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" placeholder="Usuario">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Contraseña">
            
            <button type="submit">Acceder</button>
        </form>
    </div>

    <script src="scripts/acceso.js"></script>
</body>
</html>
